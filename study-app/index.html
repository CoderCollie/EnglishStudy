<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/EnglishStudy/favicon.svg" />
    <link rel="manifest" href="/EnglishStudy/manifest.webmanifest" />
    
    <!-- iOS PWA Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Anki English" />
    <link rel="apple-touch-icon" href="/EnglishStudy/favicon.svg" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    
    <title>Anki English | 1,000 Flashcards</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/EnglishStudy/sw.js').then(reg => {
            reg.onupdatefound = () => {
              const installingWorker = reg.installing;
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed') {
                  if (navigator.serviceWorker.controller) {
                    // 새로운 버전이 감지됨! 커스텀 이벤트 발생
                    window.dispatchEvent(new CustomEvent('swUpdateAvailable', { detail: reg }));
                  }
                }
              };
            };
          });
        });
      }
    </script>
  </body>
</html>
